name: CI Pipeline - Feedback Analytics

on:
  push:
    branches: [main, homolog]
  pull_request:
    branches: [main, homolog]

jobs:
  test-api-gateway:
    name: api-gateway tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backends/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            backends/api-gateway/package-lock.json

      - name: Install shared
        run: npm ci
        working-directory: shared

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  test-ia-analyze:
    name: ia-analyze tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ia-analyze
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            shared/package-lock.json
            services/ia-analyze/package-lock.json

      - name: Install shared
        run: npm ci
        working-directory: shared

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-web:
    name: web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            shared/package-lock.json

      - name: Install shared
        run: npm ci --prefix shared

      - name: Install web dependencies
        run: npm ci --prefix apps/web

      - name: Lint
        run: npm run lint
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
