name: CI Pipeline - Feedback Analytics

on:
  push:
    branches: [main, homolog]
  pull_request:
    branches: [main, homolog]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/web/package-lock.json
            backends/api-gateway/package-lock.json
            services/ia-analyze/package-lock.json
            shared/lib/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix shared/lib
          npm ci --prefix backends/api-gateway
          npm ci --prefix apps/web
          npm ci --prefix services/ia-analyze

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Build project
        run: npm run build
