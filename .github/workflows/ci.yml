name: CI Pipeline - Feedback Analytics

on:
  push:
    branches: [main, homolog]
  pull_request:
    branches: [main, homolog]

jobs:
  # ----------------------------------------------------------------------------
  # Job 1: lint + typecheck dos 3 pacotes + build do web.
  # Roda em PR -> homolog E PR -> main (e nos pushes pos-merge).
  # O typecheck usa tsconfig.ci.json por pacote (exclui testes); o codigo de
  # producao dos 3 pacotes compila limpo via `tsc --noEmit`.
  # ----------------------------------------------------------------------------
  quality:
    name: lint-typecheck-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/web/package-lock.json
            backends/api-gateway/package-lock.json
            services/ia-analyze/package-lock.json
            shared/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix shared
          npm ci --prefix backends/api-gateway
          npm ci --prefix apps/web
          npm ci --prefix services/ia-analyze

      - name: Run linter (3 pacotes)
        run: npm run lint

      - name: Typecheck (3 pacotes, sem testes)
        run: |
          ./apps/web/node_modules/.bin/tsc -p apps/web/tsconfig.ci.json --noEmit
          ./backends/api-gateway/node_modules/.bin/tsc -p backends/api-gateway/tsconfig.ci.json --noEmit
          ./services/ia-analyze/node_modules/.bin/tsc -p services/ia-analyze/tsconfig.ci.json --noEmit

      - name: Build web
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  # ----------------------------------------------------------------------------
  # Job 2: unit + integracao (vitest) dos 3 pacotes, em paralelo via matriz.
  # Roda em PR -> homolog E PR -> main. 100% mockado, nenhum secret necessario.
  #
  # CUIDADO: o script "test" de apps/web e `vitest` SEM `run` (modo watch, que
  # travaria o CI). Resolvido com `-- run` (repassa `run` ao vitest atraves do
  # npm --prefix). api-gateway e ia-analyze ja usam `vitest run` (CI-safe).
  # ----------------------------------------------------------------------------
  unit-tests:
    name: unit-tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: web
            prefix: apps/web
            test_cmd: npm run test --prefix apps/web -- run
          - package: api-gateway
            prefix: backends/api-gateway
            test_cmd: npm run test --prefix backends/api-gateway
          - package: ia-analyze
            prefix: services/ia-analyze
            test_cmd: npm run test --prefix services/ia-analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            apps/web/package-lock.json
            backends/api-gateway/package-lock.json
            services/ia-analyze/package-lock.json
            shared/package-lock.json

      - name: Install dependencies (shared + ${{ matrix.package }})
        run: |
          npm ci --prefix shared
          npm ci --prefix ${{ matrix.prefix }}

      - name: Run vitest (${{ matrix.package }})
        run: ${{ matrix.test_cmd }}
