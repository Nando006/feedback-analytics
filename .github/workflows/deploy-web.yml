name: Deploy Web (Vercel) — Production

on:
  push:
    branches: [main]
    paths-ignore:
      - "backends/api-gateway/**"
      - "database/**"
      - "services/ia-analyze/**"

concurrency:
  group: deploy-web-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            apps/web/package-lock.json
            shared/package-lock.json

      - name: Install dependecies
        run: |
          npm ci --prefix shared
          npm ci --prefix apps/web

      - name: Deploy production (main)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
        run: npx vercel deploy --yes --prod --token "$VERCEL_TOKEN" --local-config apps/web/vercel.json
