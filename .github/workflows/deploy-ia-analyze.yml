name: Deploy IA Analyze Service (Vercel) — Production

on:
  push:
    branches: [main]
    paths:
      - "services/ia-analyze/**"
      - "shared/interfaces/contracts/ia-analyze/**"
      - "services/ia-analyze/package.json"
      - "services/ia-analyze/package-lock.json"
      - "shared/package.json"
      - "shared/package-lock.json"
      - ".github/workflows/deploy-ia-analyze.yml"

concurrency:
  group: deploy-ia-analyze-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-ia-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            services/ia-analyze/package-lock.json
            shared/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix shared
          npm ci --prefix services/ia-analyze

      - name: Deploy production (main)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID_IA_ANALYZE'] }}
        run: npx vercel deploy --yes --prod --token "$VERCEL_TOKEN" --local-config services/ia-analyze/vercel.json
