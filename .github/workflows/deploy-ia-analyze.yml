name: Deploy IA Analyze Service (Vercel)

on:
  workflow_dispatch:
    inputs:
      confirm_deploy:
        description: "Digite ok para confirmar deploy."
        required: true
        type: string

concurrency:
  group: deploy-ia-analyze-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-ia-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Validação manual de requests
        run: |
          if [ "${{ github.ref_name }}" != "homolog" ] && [ "${{ github.ref_name }}" != "main" ]; then
            echo "Este workflow deve ser executado apenas nas branches main ou homolog"
            exit 1
          fi

          if [ "${{ github.event.inputs.confirm_deploy }}" != "ok" ]; then
            echo "Confirme o deploy informando ok"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            services/ia-analyze/package-lock.json
            shared/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix shared
          npm ci --prefix services/ia-analyze

      - name: Deploy preview (homolog)
        if: github.ref_name == 'homolog'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID_IA_ANALYZE'] }}
        run: npx vercel deploy --yes --token "$VERCEL_TOKEN" --local-config services/ia-analyze/vercel.json

      - name: Deploy production (main)
        if: github.ref_name == 'main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID_IA_ANALYZE'] }}
        run: npx vercel deploy --yes --prod --token "$VERCEL_TOKEN" --local-config services/ia-analyze/vercel.json
