name: Branch Policy Enforcement

on:
  # Este workflow roda apenas em Pull Requests que miram a branch 'main'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

jobs:
  check-source-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Verify that the source branch is 'homolog'
        run: |
          # A variável GITHUB_HEAD_REF contém o nome da branch de origem do PR
          echo "Pull Request is from branch: ${{ github.head_ref }}"
          if [[ "${{ github.head_ref }}" != "homolog" ]]; then
            echo "Error: Pull Requests to 'main' are only allowed from the 'homolog' branch."
            exit 1 # Causa a falha do job
          fi
          echo "Success: Pull Request is from 'homolog' branch. Policy check passed."
