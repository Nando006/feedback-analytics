name: Deploy IA Studio Service (Vercel)

on:
  push:
    branches: [main, homolog]
    paths:
      - "services/ia-studio/**"
      - "apps/backend-gateway/src/server/express/services/iaStudioService.ts"
      - "apps/backend-gateway/src/server/express/services/iaStudioPromptBuilders.ts"
      - "shared/lib/interfaces/contracts/ia-studio.contract.ts"
      - "services/ia-studio/package.json"
      - "services/ia-studio/package-lock.json"
      - "apps/backend-gateway/package.json"
      - "apps/backend-gateway/package-lock.json"
      - ".github/workflows/deploy-ia-studio.yml"
  workflow_dispatch:

jobs:
  deploy-ia-studio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            apps/backend-gateway/package-lock.json
            services/ia-studio/package-lock.json
            shared/lib/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix shared/lib
          npm ci --prefix apps/backend-gateway
          npm ci --prefix services/ia-studio

      - name: Deploy preview (homolog)
        if: github.ref_name == 'homolog'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID_IA_STUDIO'] }}
        run: npx vercel deploy --yes --token "$VERCEL_TOKEN" --local-config services/ia-studio/vercel.json

      - name: Deploy production (main)
        if: github.ref_name == 'main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID_IA_STUDIO'] }}
        run: npx vercel deploy --yes --prod --token "$VERCEL_TOKEN" --local-config services/ia-studio/vercel.json
