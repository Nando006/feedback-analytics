name: Deploy IA Studio Service (Vercel)

on:
  push:
    branches: [main, homolog]
    paths:
      - "services/ia-studio-google/**"
      - "src/server/express/services/iaStudioService.ts"
      - "src/server/express/services/iaStudioPromptBuilders.ts"
      - "lib/interfaces/contracts/ia-studio.contract.ts"
      - "package.json"
      - ".github/workflows/deploy-ia-studio-google.yml"
  workflow_dispatch:

jobs:
  deploy-ia-studio-google:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Deploy preview (homolog)
        if: github.ref_name == 'homolog'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID_IA_STUDIO'] }}
        run: npx vercel deploy --yes --token "$VERCEL_TOKEN" --local-config services/ia-studio-google/vercel.json

      - name: Deploy production (main)
        if: github.ref_name == 'main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets['VERCEL_PROJECT_ID_IA_STUDIO'] }}
        run: npx vercel deploy --yes --prod --token "$VERCEL_TOKEN" --local-config services/ia-studio-google/vercel.json
