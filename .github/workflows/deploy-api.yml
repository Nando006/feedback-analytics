name: Deploy API (Vercel)

on:
  push:
    branches: [main, homolog]
    paths:
      - "apps/backend-gateway/src/server/**"
      - "shared/lib/**"
      - "database/**"
      - "apps/backend-gateway/vercel.json"
      - "apps/backend-gateway/package.json"
      - "apps/backend-gateway/package-lock.json"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            apps/backend-gateway/package-lock.json
            shared/lib/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --prefix shared/lib
          npm ci --prefix apps/backend-gateway

      - name: Deploy preview (homolog)
        if: github.ref_name == 'homolog'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}
        run: npx vercel deploy --yes --token "$VERCEL_TOKEN" --local-config apps/backend-gateway/vercel.json

      - name: Deploy production (main)
        if: github.ref_name == 'main'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_API }}
        run: npx vercel deploy --yes --prod --token "$VERCEL_TOKEN" --local-config apps/backend-gateway/vercel.json