          - UC-06 — Ativação de Tipos de Feedback: concepcao/casos-de-uso/uc-06-ativacao-tipos-feedback.md
          - UC-07 — Configuração do Catálogo: concepcao/casos-de-uso/uc-07-configuracao-catalogo.md
