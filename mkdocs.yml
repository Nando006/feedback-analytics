site_name: Feedback Analytics — Documentação
site_description: Documentação do Feedback Analytics (Concepção, Projeto Técnico e Implementação).
site_url: https://tcc-feedback-analytics.github.io/feedback-analytics/
site_author: TCC Feedback Analytics

repo_name: TCC-Feedback-Analytics/feedback-analytics
repo_url: https://github.com/TCC-Feedback-Analytics/feedback-analytics
edit_uri: edit/main/docs/

docs_dir: docs

# Validação de links: com --strict no CI, link/âncora quebrada falha o build (e o deploy).
validation:
  nav:
    omitted_files: warn
    not_found: warn
  links:
    not_found: warn
    anchors: warn
    unrecognized_links: warn

theme:
  name: material
  language: pt-BR
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Mudar para o modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Mudar para o modo claro
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: pt

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

